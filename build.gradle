plugins {
    id 'java-library'
    id 'groovy'
    id 'io.curity.ps.curity-plugin-dev' version '0.2.0'
}

group = 'io.curity.identityserver.plugins'
description = 'Curity Plugin Description'

if (project.hasProperty('releaseVersion')) {
    project.version = project.releaseVersion
} else {
    project.version = '0.0.1'
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    compileOnly 'se.curity.identityserver:identityserver.sdk:10.7.1'
    compileOnly 'org.slf4j:slf4j-api:2.0.12'

    implementation 'io.curity.ps:curity-ps-sdk-commons:0.3.0'

    testImplementation 'se.curity.identityserver:identityserver.sdk:10.7.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.2'
    testImplementation 'org.spockframework:spock-core:2.4-M4-groovy-4.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}


java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

test {
    useJUnitPlatform()
    testLogging {
        events "started", "passed", "skipped", "failed"
    }
}

// Configure JAR manifest
jar {
    manifest {
        attributes(
                'Implementation-Title': project.name,
                'Implementation-Version': project.version,
                'Built-By': System.getProperty('user.name'),
                'Build-Jdk': "${System.getProperty('java.version')} (${System.getProperty('java.vendor')})",
                'Created-By': "Gradle ${gradle.gradleVersion}"
        )
    }
}